name: Tests

on:
  push:
    branches:
      - master
      - main
      - "claude/**"
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / ${{ matrix.stability }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]
        laravel: ["8.*", "9.*", "10.*"]
        stability: [prefer-stable]
        include:
          # Lowest-dependency smoke test on oldest supported combination
          - php: "8.1"
            laravel: "8.*"
            stability: prefer-lowest
        exclude:
          # Laravel 10 requires PHP 8.1+, already covered — no need to repeat
          # Laravel 8 dropped official support for PHP 8.3+ (testbench constraint)
          - php: "8.3"
            laravel: "8.*"
          - php: "8.4"
            laravel: "8.*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, sqlite3
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.stability }}-

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
